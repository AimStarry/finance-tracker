<div class="auth-bg">
  <mat-card class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">F</div>
      <h1>FinanceTracker</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="email" placeholder="you@example.com">
      <mat-icon matPrefix style="margin-right:6px;color:#4c7273">email</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput [type]="showPass ? 'text' : 'password'" [(ngModel)]="password">
      <mat-icon matPrefix style="margin-right:6px;color:#4c7273">lock</mat-icon>
      <button matSuffix mat-icon-button type="button" (click)="showPass = !showPass">
        <mat-icon>{{ showPass ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <button mat-raised-button color="primary" class="submit-btn" (click)="login()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <div class="text-center">
      Don't have an account? <a routerLink="/register">Create one</a>
    </div>
  </mat-card>
</div>
